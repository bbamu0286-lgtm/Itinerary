<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Planner</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;color:#333}
  .container{max-width:1200px;margin:0 auto}
  header{background:white;border-radius:16px;padding:20px 28px;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
  .summary-header{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;padding:4px 0}
  .summary-toggle{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:#edf2f7;color:#4a5568;font-weight:700;font-size:18px;line-height:1}
  .summary-header:hover .summary-toggle{background:#667eea;color:white}
  .summary-title{font-size:15px;color:#2d3748;font-weight:700}
  .collapsible{overflow:hidden;transition:max-height .3s ease,opacity .3s ease,margin .3s ease;max-height:2000px;opacity:1;margin-top:14px}
  .collapsible.collapsed{max-height:0;opacity:0;margin-top:0}
  .summary-wrapper{margin-bottom:16px}
  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
  .summary-card{background:linear-gradient(135deg,#f6f9fc 0%,#edf2f7 100%);padding:14px;border-radius:12px;border-left:4px solid #667eea}
  .summary-card.move{border-left-color:#3182ce}
  .summary-card.sight{border-left-color:#dd6b20}
  .summary-card.meal{border-left-color:#38a169}
  .summary-card.total{border-left-color:#e53e3e}
  .summary-card .label{font-size:11px;color:#718096;margin-bottom:4px}
  .summary-card .value{font-size:18px;font-weight:700;color:#2d3748}
  .title-block{padding-top:6px;border-top:1px solid #edf2f7;margin-top:6px}
  h1{font-size:26px;color:#4a5568;display:flex;align-items:center;gap:12px;padding-top:10px}
  h1::before{content:"✈️";font-size:30px}
  .subtitle{color:#718096;margin-top:6px;font-size:14px}
  .sync-status{display:inline-block;margin-top:8px;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
  .sync-status.connected{background:#c6f6d5;color:#22543d}
  .sync-status.connecting{background:#feebc8;color:#7b341e}
  .sync-status.error{background:#fed7d7;color:#742a2a}
  .layout{display:grid;grid-template-columns:1fr 380px;gap:20px}
  @media (max-width:900px){.layout{grid-template-columns:1fr}}
  .timeline-section,.form-section{background:white;border-radius:16px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
  .section-title{font-size:18px;color:#2d3748;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #e2e8f0}
  .date-tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:8px}
  .date-tab{flex-shrink:0;padding:10px 14px;background:#f7fafc;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;font-size:13px;color:#4a5568;transition:all .2s;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:80px}
  .date-tab:hover{border-color:#667eea;color:#667eea}
  .date-tab.active{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border-color:transparent}
  .date-tab .tab-day{font-weight:700;font-size:14px}
  .date-tab .tab-date{font-size:11px;opacity:.85}
  .day-group{margin-bottom:28px;scroll-margin-top:20px}
  .day-header{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:12px 18px;border-radius:12px;margin-bottom:16px;font-weight:600;flex-wrap:wrap}
  .day-header .day-num{background:white;color:#667eea;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700}
  .day-header .day-stats{margin-left:auto;font-size:13px;opacity:.95;font-weight:400}
  .timeline{position:relative;padding-left:23px}
  .timeline::before{content:"";position:absolute;left:10px;top:0;bottom:0;width:3px;background:#cbd5e0}
  .timeline-item{position:relative;margin-bottom:0}
  .timeline-item .dot{position:absolute;left:-23px;top:14px;width:24px;height:24px;border-radius:50%;background:#667eea;border:4px solid white;box-shadow:0 0 0 2px #667eea;z-index:2}
  .card{background:#f7fafc;border-radius:12px;padding:16px;border:1px solid #e2e8f0}
  .route-lines{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
  .route-line{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:#2d3748;flex-wrap:wrap}
  .role-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;font-size:13px;font-weight:700;color:white;flex-shrink:0}
  .role-suffix{font-size:14px;color:#2d3748;font-weight:600}
  .role-time{font-size:12px;color:#6b46c1;background:#faf5ff;border:1px solid #e9d8fd;padding:2px 8px;border-radius:6px;font-weight:600;margin-left:auto}
  .role-gather{background:#e53e3e}
  .role-from{background:#3182ce}
  .role-to{background:#38a169}
  .role-stay{background:#805ad5}
  .role-sight{background:#dd6b20}
  .info-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:12px;background:white;border:1px solid #e2e8f0;color:#4a5568}
  .badge.sightTime{background:#fff5f7;color:#b83280;border-color:#fbb6ce}
  .badge.sightFee{background:#fffaf0;color:#c05621;border-color:#fbd38d}
  .badge.mealFee{background:#f0fff4;color:#276749;border-color:#c6f6d5}
  .badge.move{background:#ebf8ff;color:#2c5282;border-color:#bee3f8}
  .travel-info{margin:8px 0;padding:8px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:12px;color:#4a5568;background:#ebf8ff;border:1px dashed #90cdf4;border-radius:8px}
  .travel-info .t-item{display:inline-flex;align-items:center;gap:4px;color:#2c5282;font-weight:600}
  .travel-info .t-sep{color:#a0aec0}
  .actions{margin-top:10px;display:flex;gap:8px}
  .btn-small{padding:4px 10px;font-size:12px;border:none;border-radius:6px;cursor:pointer}
  .btn-edit{background:#4299e1;color:white}
  .btn-delete{background:#fc8181;color:white}
  .form-group{margin-bottom:14px}
  label{display:flex;align-items:center;flex-wrap:wrap;gap:6px;font-size:13px;font-weight:600;color:#4a5568;margin-bottom:5px}
  label .optional{color:#a0aec0;font-weight:400;font-size:11px}
  .copy-btn{margin-left:auto;background:#edf2f7;border:1px solid #cbd5e0;color:#4a5568;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s}
  .copy-btn:hover{background:#667eea;color:white;border-color:#667eea}
  .copy-btn.copied{background:#38a169;color:white;border-color:#38a169}
  input,select,textarea{width:100%;padding:8px 12px;border:1px solid #cbd5e0;border-radius:8px;font-size:14px;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.1)}
  textarea{resize:vertical;min-height:60px}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  input[type=number]{-moz-appearance:textfield;appearance:textfield}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .place-row,.sights-row{display:grid;grid-template-columns:1fr 110px;gap:6px;align-items:start}
  .transport-toggle{display:flex;gap:4px;margin-bottom:6px;background:#edf2f7;padding:3px;border-radius:8px}
  .transport-toggle button{flex:1;padding:5px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:12px;color:#718096}
  .transport-toggle button.active{background:white;color:#667eea;font-weight:600}
  .fee-row{display:flex;gap:6px;align-items:center}
  .fee-row input{flex:1}
  .person-toggle{display:inline-flex;background:#edf2f7;padding:2px;border-radius:6px;flex-shrink:0}
  .person-toggle button{padding:4px 10px;border:none;background:transparent;border-radius:4px;cursor:pointer;font-size:11px;color:#718096}
  .person-toggle button.active{background:white;color:#667eea;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,0.1)}
  .btn{width:100%;padding:12px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
  .btn-secondary{background:#e2e8f0;color:#4a5568}
  .empty{text-align:center;padding:40px 20px;color:#a0aec0}
  .empty .icon{font-size:48px;margin-bottom:12px}
  .toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .toolbar button{padding:8px 14px;background:white;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:13px;color:#4a5568}
  .toolbar button:hover{background:#f7fafc;border-color:#667eea;color:#667eea}
  .role-label{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;font-size:11px;font-weight:700;color:white;vertical-align:middle}
  .form-hint{font-size:11px;color:#a0aec0;margin-top:4px}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="summary-header" onclick="toggleSummary()">
      <span class="summary-toggle" id="summary-toggle">−</span>
      <span class="summary-title" id="summary-title">📊 全日程のサマリー</span>
    </div>
    <div class="collapsible" id="collapsible-area">
      <div class="summary-wrapper"><div class="summary" id="summary"></div></div>
      <div class="title-block">
        <h1>Trip Planner</h1>
        <div class="subtitle">二人で共有できる旅行日程ビジュアライザー</div>
        <div id="sync-status" class="sync-status connecting">⏳ 接続中...</div>
      </div>
    </div>
  </header>
  <div class="layout">
    <div class="timeline-section">
      <div class="section-title">🗺️ Timeline</div>
      <div class="date-tabs" id="date-tabs"></div>
      <div class="toolbar">
        <button onclick="loadSample()">📋 サンプル読み込み</button>
        <button onclick="exportJSON()">💾 エクスポート</button>
        <button onclick="clearAll()">🗑️ 全削除</button>
      </div>
      <div id="timeline"></div>
    </div>
    <div class="form-section">
      <div class="section-title" id="form-title">➕ 新しい行程を追加</div>
      <form id="trip-form" onsubmit="addOrUpdate(event)">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label>📅 日付<span class="optional">（任意）</span></label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label><span class="role-label role-gather">集</span>集合場所<span class="optional">（任意）</span></label>
          <div class="place-row">
            <input type="text" id="gather">
            <input type="time" id="gatherTime" title="集合時刻">
          </div>
        </div>
        <div class="form-group">
          <label><span class="role-label role-from">出</span>出発地<span class="optional">（任意）</span>
            <button type="button" class="copy-btn" data-copy-target="from" data-copy-source="gather">⧉ 集合場所からコピー</button>
          </label>
          <div class="place-row">
            <input type="text" id="from">
            <input type="time" id="fromTime" title="出発時刻">
          </div>
        </div>
        <div class="form-group">
          <label><span class="role-label role-to">着</span>到着地<span class="optional">（任意）</span>
            <button type="button" class="copy-btn" data-copy-target="to" data-copy-source="from">⧉ 出発地からコピー</button>
          </label>
          <div class="place-row">
            <input type="text" id="to">
            <input type="time" id="toTime" title="到着時刻">
          </div>
        </div>
        <div class="form-group">
          <label><span class="role-label role-stay">泊</span>滞在地<span class="optional">（任意）</span>
            <button type="button" class="copy-btn" data-copy-target="stay" data-copy-source="to">⧉ 到着地からコピー</button>
          </label>
          <div class="place-row">
            <input type="text" id="stay">
            <input type="time" id="stayTime" title="チェックイン時刻">
          </div>
        </div>
        <div class="form-group">
          <label><span class="role-label role-sight">観</span>観光場所<span class="optional">（任意・改行で複数）</span>
            <button type="button" class="copy-btn" data-copy-target="sights" data-copy-source="to">⧉ 到着地からコピー</button>
          </label>
          <div class="sights-row">
            <textarea id="sights"></textarea>
            <input type="time" id="sightStartTime" title="観光開始時刻">
          </div>
          <div class="form-hint">観光時刻は最初の観光地に対する開始時刻です</div>
        </div>
        <div class="form-group">
          <label>🚄 移動手段<span class="optional">（任意）</span></label>
          <div class="transport-toggle">
            <button type="button" id="toggle-select" class="active" onclick="switchTransport('select')">選択</button>
            <button type="button" id="toggle-input" onclick="switchTransport('input')">自由入力</button>
          </div>
          <select id="transportSelect">
            <option value="">（選択しない）</option>
            <option value="🚄 新幹線">🚄 新幹線</option>
            <option value="✈️ 飛行機">✈️ 飛行機</option>
            <option value="🚗 車">🚗 車</option>
            <option value="🚌 バス">🚌 バス</option>
            <option value="🚆 電車">🚆 電車</option>
            <option value="🚢 船">🚢 船</option>
            <option value="🚶 徒歩">🚶 徒歩</option>
            <option value="🚕 タクシー">🚕 タクシー</option>
            <option value="🚲 自転車">🚲 自転車</option>
          </select>
          <input type="text" id="transportInput" style="display:none;margin-top:4px">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>⏱ 移動時間<span class="optional">（分）</span></label>
            <input type="number" id="duration" min="0">
          </div>
          <div class="form-group">
            <label><span class="role-label role-sight">観</span>観光時間<span class="optional">（分）</span></label>
            <input type="number" id="sightTime" min="0">
          </div>
        </div>
        <div class="form-group">
          <label>🚄 移動費用<span class="optional">（円）</span></label>
          <div class="fee-row">
            <input type="number" id="price" min="0">
            <div class="person-toggle">
              <button type="button" id="move-1" class="active" onclick="setPersons('move',1)">1人</button>
              <button type="button" id="move-2" onclick="setPersons('move',2)">2人</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>🎫 観光費用<span class="optional">（円）</span></label>
          <div class="fee-row">
            <input type="number" id="sightFee" min="0">
            <div class="person-toggle">
              <button type="button" id="sight-1" class="active" onclick="setPersons('sight',1)">1人</button>
              <button type="button" id="sight-2" onclick="setPersons('sight',2)">2人</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>🍽️ 食事費用<span class="optional">（円）</span></label>
          <div class="fee-row">
            <input type="number" id="mealFee" min="0">
            <div class="person-toggle">
              <button type="button" id="meal-1" class="active" onclick="setPersons('meal',1)">1人</button>
              <button type="button" id="meal-2" onclick="setPersons('meal',2)">2人</button>
            </div>
          </div>
        </div>
        <button type="submit" class="btn" id="submit-btn">追加する</button>
        <button type="button" class="btn btn-secondary" id="cancel-btn" onclick="resetForm()" style="display:none">キャンセル</button>
      </form>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDW0igcPNMIhKTg85EkGaEUDig_phji6us",
  authDomain: "trip-plan-b8422.firebaseapp.com",
  projectId: "trip-plan-b8422",
  storageBucket: "trip-plan-b8422.firebasestorage.app",
  messagingSenderId: "107179626802",
  appId: "1:107179626802:web:19bfa63d0161376578872b",
  measurementId: "G-1CXGQX1T2L"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const tripsCol = collection(db, "trips");

window.trips = [];
window.transportMode = 'select';
window.selectedDate = '__all__';
window.currentPersons = { move:1, sight:1, meal:1 };
window.lastInputDate = localStorage.getItem('lastInputDate') || '';

const statusEl = document.getElementById('sync-status');

onSnapshot(tripsCol, (snap) => {
  window.trips = [];
  snap.forEach(d => window.trips.push({ id: d.id, ...d.data() }));
  statusEl.className = 'sync-status connected';
  statusEl.textContent = '✅ 同期中（クラウド保存）';
  render();
}, (err) => {
  console.error(err);
  statusEl.className = 'sync-status error';
  statusEl.textContent = '⚠️ 接続エラー: ' + err.message;
});

window.saveTrip = async function(data){ await setDoc(doc(tripsCol, data.id), data); };
window.deleteTripDoc = async function(id){ await deleteDoc(doc(tripsCol, id)); };
window.clearAllDocs = async function(){
  const snap = await getDocs(tripsCol);
  const batch = writeBatch(db);
  snap.forEach(d => batch.delete(d.ref));
  await batch.commit();
};
window.bulkSave = async function(arr){
  const batch = writeBatch(db);
  arr.forEach(t => batch.set(doc(tripsCol, t.id), t));
  await batch.commit();
};

document.querySelectorAll('input[type=number]').forEach(el=>{
  el.addEventListener('wheel', e=>{
    if(document.activeElement===el){ e.preventDefault(); el.blur(); setTimeout(()=>el.focus(),0); }
  },{passive:false});
});
</script>

<script>
function getNumber(id){ const v = Number(document.getElementById(id).value); return (isNaN(v)||v<0)?0:v; }
function getVal(id){ return document.getElementById(id).value; }
function getStr(id){ return document.getElementById(id).value.trim(); }
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function formatDuration(min){ if(!min) return '0分'; const h=Math.floor(min/60), m=min%60; return (h?h+'時間':'')+(m?m+'分':'')||'0分'; }

function switchTransport(mode){
  transportMode=mode;
  document.getElementById('toggle-select').classList.toggle('active',mode==='select');
  document.getElementById('toggle-input').classList.toggle('active',mode==='input');
  document.getElementById('transportSelect').style.display=mode==='select'?'block':'none';
  document.getElementById('transportInput').style.display=mode==='input'?'block':'none';
}
function getTransportValue(){ return transportMode==='select'?document.getElementById('transportSelect').value:document.getElementById('transportInput').value.trim(); }

function setPersons(kind,n){
  currentPersons[kind]=n;
  document.getElementById(kind+'-1').classList.toggle('active',n===1);
  document.getElementById(kind+'-2').classList.toggle('active',n===2);
}

function applyDefaultsToForm(){
  const d=document.getElementById('date');
  if(!d.value && lastInputDate) d.value=lastInputDate;
}

document.querySelectorAll('.copy-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const targetId = btn.dataset.copyTarget;
    const sourceId = btn.dataset.copySource;
    const src = document.getElementById(sourceId);
    const dst = document.getElementById(targetId);
    if(!src || !dst) return;
    const v = src.value.trim();
    if(!v){
      btn.textContent = '⚠ 元が空です';
      setTimeout(()=>{ resetCopyBtnLabel(btn); }, 1200);
      return;
    }
    dst.value = v;
    btn.classList.add('copied');
    btn.textContent = '✓ コピー完了';
    setTimeout(()=>{ btn.classList.remove('copied'); resetCopyBtnLabel(btn); }, 1200);
  });
});
function resetCopyBtnLabel(btn){
  const map = { gather:'集合場所', from:'出発地', to:'到着地', stay:'滞在地', sights:'観光場所' };
  btn.textContent = '⧉ ' + (map[btn.dataset.copySource]||'前項') + 'からコピー';
}

function toggleSummary(){
  const area=document.getElementById('collapsible-area');
  const tgl=document.getElementById('summary-toggle');
  const willCollapse = !area.classList.contains('collapsed');
  area.classList.toggle('collapsed', willCollapse);
  tgl.textContent = willCollapse ? '＋' : '−';
  localStorage.setItem('summaryCollapsed', willCollapse ? '1' : '0');
  if(willCollapse){
    setTimeout(()=>{
      const sec=document.querySelector('.timeline-section');
      if(sec){
        const y = sec.getBoundingClientRect().top + window.pageYOffset - 12;
        window.scrollTo({top:y, behavior:'smooth'});
      }
    }, 320);
  }
}
function applySummaryCollapseUI(){
  const collapsed = localStorage.getItem('summaryCollapsed')==='1';
  const area=document.getElementById('collapsible-area');
  const tgl=document.getElementById('summary-toggle');
  area.classList.toggle('collapsed', collapsed);
  tgl.textContent = collapsed ? '＋' : '−';
}

function addOrUpdate(e){
  e.preventDefault();
  const editId=document.getElementById('edit-id').value;
  const data={
    id: editId || ('t'+Date.now()+Math.random().toString(36).slice(2,6)),
    date: getVal('date'),
    gather: getStr('gather'),
    gatherTime: getVal('gatherTime'),
    from: getStr('from'),
    fromTime: getVal('fromTime'),
    to: getStr('to'),
    toTime: getVal('toTime'),
    stay: getStr('stay'),
    stayTime: getVal('stayTime'),
    sights: document.getElementById('sights').value,
    sightStartTime: getVal('sightStartTime'),
    transport: getTransportValue(),
    duration: getNumber('duration'),
    sightTime: getNumber('sightTime'),
    price: getNumber('price'),
    sightFee: getNumber('sightFee'),
    mealFee: getNumber('mealFee'),
    movePersons: currentPersons.move,
    sightPersons: currentPersons.sight,
    mealPersons: currentPersons.meal,
    createdAt: Date.now()
  };
  if(data.date){ lastInputDate=data.date; localStorage.setItem('lastInputDate',data.date); }
  saveTrip(data).catch(err=>alert('保存エラー: '+err.message));
  resetForm();
}

function editTrip(id){
  const t=trips.find(x=>x.id===id); if(!t) return;
  document.getElementById('edit-id').value=t.id;
  document.getElementById('date').value=t.date||'';
  document.getElementById('gather').value=t.gather||'';
  document.getElementById('gatherTime').value=t.gatherTime||t.departTime||'';
  document.getElementById('from').value=t.from||'';
  document.getElementById('fromTime').value=t.fromTime||'';
  document.getElementById('to').value=t.to||'';
  document.getElementById('toTime').value=t.toTime||'';
  document.getElementById('stay').value=t.stay||'';
  document.getElementById('stayTime').value=t.stayTime||'';
  document.getElementById('sights').value=t.sights||'';
  document.getElementById('sightStartTime').value=t.sightStartTime||'';
  const sel=document.getElementById('transportSelect');
  const opts=Array.from(sel.options).map(o=>o.value);
  if(opts.includes(t.transport)){ switchTransport('select'); sel.value=t.transport; }
  else{ switchTransport('input'); document.getElementById('transportInput').value=t.transport||''; }
  document.getElementById('duration').value=t.duration||'';
  document.getElementById('sightTime').value=t.sightTime||'';
  document.getElementById('price').value=t.price||'';
  document.getElementById('sightFee').value=t.sightFee||'';
  document.getElementById('mealFee').value=t.mealFee||'';
  setPersons('move', t.movePersons||t.persons||1);
  setPersons('sight', t.sightPersons||t.persons||1);
  setPersons('meal', t.mealPersons||t.persons||1);
  document.getElementById('form-title').textContent='✏️ 行程を編集';
  document.getElementById('submit-btn').textContent='更新する';
  document.getElementById('cancel-btn').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function deleteTrip(id){ if(confirm('この行程を削除しますか？')) deleteTripDoc(id).catch(err=>alert('削除エラー: '+err.message)); }

function resetForm(){
  document.getElementById('trip-form').reset();
  document.getElementById('edit-id').value='';
  document.getElementById('transportInput').value='';
  switchTransport('select');
  setPersons('move',1); setPersons('sight',1); setPersons('meal',1);
  applyDefaultsToForm();
  document.getElementById('form-title').textContent='➕ 新しい行程を追加';
  document.getElementById('submit-btn').textContent='追加する';
  document.getElementById('cancel-btn').style.display='none';
}

function clearAll(){ if(confirm('すべての行程をクラウドから削除しますか？')) clearAllDocs().catch(err=>alert(err.message)); }

function exportJSON(){
  const blob=new Blob([JSON.stringify(trips,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='trip-itinerary.json'; a.click();
}

function formatDateLabel(d){ if(!d) return '日付未設定'; const dt=new Date(d+'T00:00:00'); const w='日月火水木金土'[dt.getDay()]; return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日（${w}）`; }
function formatDateShort(d){ if(!d) return '未設定'; const dt=new Date(d+'T00:00:00'); const w='日月火水木金土'[dt.getDay()]; return `${dt.getMonth()+1}/${dt.getDate()}(${w})`; }

function primaryTime(t){ return t.gatherTime || t.fromTime || t.sightStartTime || t.toTime || t.stayTime || t.departTime || ''; }
function sortKey(t){ const d=t.date||'9999-99-99'; const tm=primaryTime(t)||'99:99'; return d+' '+tm; }

function buildRouteLines(t){
  const items=[];
  if(t.gather) items.push({cls:'role-gather', label:'集', text:t.gather, time:t.gatherTime||'', suffix:'に集合'});
  if(t.from)   items.push({cls:'role-from',   label:'出', text:t.from,   time:t.fromTime||'',   suffix:'から出発'});
  if(t.to)     items.push({cls:'role-to',     label:'着', text:t.to,     time:t.toTime||'',     suffix:'に到着'});
  if(t.stay)   items.push({cls:'role-stay',   label:'泊', text:t.stay,   time:t.stayTime||'',   suffix:'に滞在'});
  if(t.sights){
    const list=t.sights.split('\n').map(s=>s.trim()).filter(s=>s);
    list.forEach((s,i)=>{ items.push({cls:'role-sight', label:'観', text:s, time:i===0?(t.sightStartTime||''):'', suffix:'を観光'}); });
  }
  items.forEach((it,i)=>it._idx=i);
  items.sort((a,b)=>{ const ak=a.time||'99:99', bk=b.time||'99:99'; if(ak!==bk) return ak.localeCompare(bk); return a._idx - b._idx; });
  return items.map(it=>{
    const timeHtml = it.time ? `<span class="role-time">🕐 ${escapeHtml(it.time)}</span>` : '';
    const suffixHtml = it.suffix ? `<span class="role-suffix">${it.suffix}</span>` : '';
    return `<div class="route-line"><span class="role-badge ${it.cls}">${it.label}</span><span>${escapeHtml(it.text)}</span>${suffixHtml}${timeHtml}</div>`;
  }).join('');
}

function feeBadgeText(amount, persons){
  if(!amount) return '';
  const total=amount*persons;
  return persons===2 ? `¥${amount.toLocaleString()} × 2人 = ¥${total.toLocaleString()}` : `¥${amount.toLocaleString()}`;
}

function buildTravelInfo(t){
  if(!(t.from && t.to)) return '';
  if(!(t.transport || t.duration || t.price)) return '';
  const parts=[];
  if(t.transport) parts.push(`<span class="t-item">${escapeHtml(t.transport)}</span>`);
  if(t.duration) parts.push(`<span class="t-item">⏱ ${formatDuration(t.duration)}</span>`);
  if(t.price){ const txt=feeBadgeText(t.price, t.movePersons||t.persons||1); parts.push(`<span class="t-item">💴 ${txt}</span>`); }
  return `<div class="travel-info">${parts.join('<span class="t-sep">｜</span>')}</div>`;
}

function render(){
  const sorted=trips.slice().sort((a,b)=>sortKey(a).localeCompare(sortKey(b)));
  // 全日程に基づいた Day 番号を一度だけ算出
  const allDates=[...new Set(sorted.map(t=>t.date||'').filter(d=>d))];
  const dayMap={}; allDates.forEach((d,i)=>{ dayMap[d]=i+1; });

  const tabs=document.getElementById('date-tabs');
  let tabsHtml=`<div class="date-tab ${selectedDate==='__all__'?'active':''}" onclick="selectDate('__all__')"><span class="tab-day">全日程</span><span class="tab-date">All</span></div>`;
  allDates.forEach(d=>{ tabsHtml+=`<div class="date-tab ${selectedDate===d?'active':''}" onclick="selectDate('${d}')"><span class="tab-day">Day ${dayMap[d]}</span><span class="tab-date">${formatDateShort(d)}</span></div>`; });
  tabs.innerHTML=tabsHtml;

  const visible = selectedDate==='__all__' ? sorted : sorted.filter(t=>t.date===selectedDate);

  const uniqDates=new Set(visible.map(t=>t.date).filter(Boolean));
  let totMove=0, totSight=0, totMoveFee=0, totSightFee=0, totMealFee=0, spots=0;
  visible.forEach(t=>{ totMove+=t.duration||0; totSight+=t.sightTime||0; totMoveFee+= (t.price||0)*(t.movePersons||t.persons||1); totSightFee+= (t.sightFee||0)*(t.sightPersons||t.persons||1); totMealFee+= (t.mealFee||0)*(t.mealPersons||t.persons||1); if(t.sights) spots+= t.sights.split('\n').filter(s=>s.trim()).length; });
  const totalAll = totMoveFee+totSightFee+totMealFee;

  document.getElementById('summary-title').textContent = selectedDate==='__all__' ? '📊 全日程のサマリー' : `📊 ${formatDateLabel(selectedDate)}のサマリー`;

  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><div class="label">日数</div><div class="value">${uniqDates.size}日</div></div>
    <div class="summary-card"><div class="label">行程数</div><div class="value">${visible.length}件</div></div>
    <div class="summary-card"><div class="label">合計移動時間</div><div class="value">${formatDuration(totMove)}</div></div>
    <div class="summary-card"><div class="label">合計観光時間</div><div class="value">${formatDuration(totSight)}</div></div>
    <div class="summary-card"><div class="label">観光スポット</div><div class="value">${spots}ヵ所</div></div>
    <div class="summary-card move"><div class="label">🚄 移動費用</div><div class="value">¥${totMoveFee.toLocaleString()}</div></div>
    <div class="summary-card sight"><div class="label">🎫 観光費用</div><div class="value">¥${totSightFee.toLocaleString()}</div></div>
    <div class="summary-card meal"><div class="label">🍽️ 食事費用</div><div class="value">¥${totMealFee.toLocaleString()}</div></div>
    <div class="summary-card total"><div class="label">💴 費用合計</div><div class="value">¥${totalAll.toLocaleString()}</div></div>
  `;

  const tl=document.getElementById('timeline');
  if(visible.length===0){
    tl.innerHTML=`<div class="empty"><div class="icon">📭</div>行程がまだありません<br>右のフォームから追加するか、「サンプル読み込み」を押してください</div>`;
    return;
  }
  const groups={};
  visible.forEach(t=>{ const k=t.date||'未設定'; (groups[k]=groups[k]||[]).push(t); });

  let html='';
  Object.keys(groups).sort().forEach(dateKey=>{
    const dayNum = dayMap[dateKey] || '-';
    const items=groups[dateKey];
    let dMove=0,dSight=0,dFee=0;
    items.forEach(t=>{ dMove+=t.duration||0; dSight+=t.sightTime||0; dFee += (t.price||0)*(t.movePersons||t.persons||1) + (t.sightFee||0)*(t.sightPersons||t.persons||1) + (t.mealFee||0)*(t.mealPersons||t.persons||1); });
    html+=`<div class="day-group" id="day-${dateKey}">
      <div class="day-header"><span class="day-num">Day ${dayNum}</span>${formatDateLabel(dateKey)}<span class="day-stats">⏱ ${formatDuration(dMove)}｜<span class="role-badge role-sight" style="display:inline-flex;width:18px;height:18px;font-size:10px;vertical-align:middle">観</span> ${formatDuration(dSight)}｜💴 ¥${dFee.toLocaleString()}</span></div>
      <div class="timeline">`;
    items.forEach((t)=>{
      const badges=[];
      if(t.sightTime) badges.push(`<span class="badge sightTime"><span class="role-badge role-sight" style="width:16px;height:16px;font-size:10px">観</span> 観光時間 ${formatDuration(t.sightTime)}</span>`);
      if(t.sightFee){ const tx=feeBadgeText(t.sightFee, t.sightPersons||t.persons||1); badges.push(`<span class="badge sightFee">🎫 ${tx}</span>`); }
      if(t.mealFee){ const tx=feeBadgeText(t.mealFee, t.mealPersons||t.persons||1); badges.push(`<span class="badge mealFee">🍽️ ${tx}</span>`); }
      const travelHtml = buildTravelInfo(t);
      html+=`<div class="timeline-item">
        <div class="dot"></div>
        <div class="card">
          <div class="route-lines">${buildRouteLines(t)||'<div class="route-line"><span style="color:#a0aec0;font-weight:400">（場所未入力）</span></div>'}</div>
          ${travelHtml}
          ${badges.length?`<div class="info-row">${badges.join('')}</div>`:''}
          <div class="actions">
            <button class="btn-small btn-edit" onclick="editTrip('${t.id}')">編集</button>
            <button class="btn-small btn-delete" onclick="deleteTrip('${t.id}')">削除</button>
          </div>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  tl.innerHTML=html;
}

function selectDate(d){
  selectedDate=d; render();
  if(d!=='__all__'){ const el=document.getElementById('day-'+d); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }
}

window.switchTransport=switchTransport;
window.setPersons=setPersons;
window.addOrUpdate=addOrUpdate;
window.editTrip=editTrip;
window.deleteTrip=deleteTrip;
window.resetForm=resetForm;
window.clearAll=clearAll;
window.exportJSON=exportJSON;
window.loadSample=loadSample;
window.selectDate=selectDate;
window.render=render;
window.toggleSummary=toggleSummary;

applySummaryCollapseUI();
applyDefaultsToForm();
</script>
